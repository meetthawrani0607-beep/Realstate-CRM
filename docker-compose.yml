version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: propcrm-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: propcrm
    ports:
      - "5432:5432"
    volumes:
      - propcrm-db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  propcrm-db-data:
